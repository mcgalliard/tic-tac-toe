app = "tic-tac-toe-server-wandering-frost-3118"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    timeout = "2s"
    path = "/healthz"
