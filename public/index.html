<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tic Tac Toe</title><link rel="stylesheet" href="/style.css?v=9"></head>
<body>
  <main class="card">
    <section id="menu">
      <p class="eyebrow">MULTIPLAYER</p><h1>Tic Tac Toe</h1><p class="sub">A quick game for two.</p>
      <section class="scoreboard" aria-labelledby="scoreboard-title"><p class="eyebrow" id="scoreboard-title">ALL-TIME RESULTS</p><div class="scores"><p><strong>X</strong><span>wins: <b id="x-wins">0</b></span></p><p><strong>O</strong><span>wins: <b id="o-wins">0</b></span></p><p><strong>Ties</strong><span><b id="ties">0</b></span></p></div></section>
      <button id="create">Create a room</button>
      <div class="or"><span>OR</span></div>
      <label for="room">Join with a room code</label><div class="join"><input id="room" maxlength="5" placeholder="ABCDE" autocomplete="off"><button id="join">Join</button></div>
    </section>
    <section id="game" hidden>
      <p class="eyebrow">ROOM <strong id="code"></strong></p><h1 id="status">Waiting for opponent…</h1><p class="player-count" id="player-count">Players: 1 / 2</p>
      <div class="board" id="board" aria-label="Tic tac toe board"></div>
      <button class="secondary" id="restart">Play again</button><button class="link" id="leave">Leave room</button>
    </section>
    <p class="notice" id="notice" role="status"></p>
    <footer class="socials"><span>Chris McGalliard</span><nav class="social-links" aria-label="Creator profiles"><a href="https://x.com/chrismcgalliard" target="_blank" rel="noopener noreferrer" aria-label="Chris McGalliard on X"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.64 7.584H.47l8.6-9.83L0 1.154h7.594l5.243 6.932L18.901 1.153Zm-1.29 19.493h2.039L6.486 3.24H4.298L17.61 20.646Z"/></svg></a><a class="linkedin" href="https://www.linkedin.com/in/christopher-mcgalliard/" target="_blank" rel="noopener noreferrer" aria-label="Christopher McGalliard on LinkedIn"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V8.98h3.42v1.57h.05c.48-.9 1.64-1.85 3.37-1.85 3.61 0 4.28 2.38 4.28 5.48v6.27ZM5.32 7.41a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14Zm-1.78 13.04h3.56V8.98H3.54v11.47Z"/></svg></a><a href="https://github.com/mcgalliard" target="_blank" rel="noopener noreferrer" aria-label="Chris McGalliard on GitHub"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .297a12 12 0 0 0-3.794 23.4c.6.111.82-.26.82-.577v-2.234c-3.338.725-4.043-1.416-4.043-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.73.083-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.304.762-1.604-2.665-.303-5.467-1.334-5.467-5.93 0-1.31.469-2.382 1.236-3.222-.124-.303-.536-1.523.117-3.176 0 0 1.008-.322 3.3 1.23A11.49 11.49 0 0 1 12 5.8c1.02.005 2.047.138 3.006.404 2.29-1.552 3.296-1.23 3.296-1.23.655 1.653.243 2.873.12 3.176.77.84 1.235 1.912 1.235 3.222 0 4.61-2.807 5.624-5.48 5.92.43.372.814 1.102.814 2.222v3.293c0 .32.216.694.825.576A12 12 0 0 0 12 .297Z"/></svg></a></nav></footer>
  </main><script src="/app.js?v=9"></script>
